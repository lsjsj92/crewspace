server:
  host: "0.0.0.0"
  port: 8000
  workers: 2
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

database:
  pool_size: 10
  max_overflow: 20
  pool_recycle: 3600

board:
  min_columns: 2
  max_columns: 5
  default_columns:
    - name: "대기"
      position: 0
      is_end: false
    - name: "진행 중"
      position: 1
      is_end: false
    - name: "완료"
      position: 2
      is_end: true

card:
  position_gap: 1000
  auto_archive_days: 7
  completed_visible_days: 3
  types:
    epic:
      color: "#722ed1"
      icon: "CrownOutlined"
      allowed_parents: []
      can_be_independent: true
      display_order: 0
    story:
      color: "#1890ff"
      icon: "BookOutlined"
      allowed_parents: ["epic"]
      can_be_independent: false
      display_order: 1
    task:
      color: "#52c41a"
      icon: "CheckSquareOutlined"
      allowed_parents: ["epic", "story"]
      can_be_independent: true
      display_order: 2
    sub_task:
      color: "#faad14"
      icon: "MinusSquareOutlined"
      allowed_parents: ["task"]
      can_be_independent: false
      display_order: 3

scheduler:
  archive_interval_hours: 1

auth:
  access_token_expire_minutes: 60
  refresh_token_expire_days: 30

hr:
  excel_path: "data/auth_member/hr_info.xlsx"
  default_password: "1234!"

sidebar:
  recent_projects_count: 5
