services:
  postgres:
    image: postgres:16-alpine
    container_name: planship-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planship}
      POSTGRES_USER: ${POSTGRES_USER:-planship}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      TZ: Asia/Seoul
    volumes:
      - planship_pgdata:/var/lib/postgresql/data
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-planship}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planship-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./data:/app/data
    ports:
      - "${HOST_BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: planship-frontend
    restart: unless-stopped
    ports:
      - "${HOST_FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  planship_pgdata:
    name: planship_pgdata
